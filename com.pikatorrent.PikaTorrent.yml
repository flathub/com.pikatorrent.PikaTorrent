app-id: com.pikatorrent.PikaTorrent
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: pikatorrent
finish-args:
  - --share=ipc
  - --share=network
  - --filesystem=xdg-download
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # To check connectivity
  - --system-talk-name=org.freedesktop.NetworkManager
cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/bash-completion
  - /share/doc
  - /share/fish
  - /share/gir-1.0
  - /share/zsh
  - "*.la"
  - "*.a"

modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  - name: libmpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dbuildtype=release
      - -Dbuild-date=false
      - -Dmanpage-build=disabled
      - -Dvulkan=enabled
    cleanup:
      - /share/icons/
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.41.0
        commit: 41f6a645068483470267271e1d09966ca3b9f413
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
    modules:
      # MPV dependencies
      - name: libplacebo
        buildsystem: meson
        config-opts:
          - -Dvulkan=enabled
          - -Dshaderc=enabled
        sources:
          - type: git
            url: https://github.com/haasn/libplacebo.git
            tag: v7.360.1
            commit: cee9b076f2c63104ccfd497fa79c39a867293ec4
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$

      - name: libass
        config-opts:
          - --disable-static
          - --enable-asm
          - --enable-harfbuzz
          - --enable-fontconfig
        sources:
          - type: git
            url: https://github.com/libass/libass.git
            tag: 0.17.4
            commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84
            x-checker-data:
              type: git
              tag-pattern: ^(\d\.\d{1,3}\.\d{1,2})$

  - name: PikaTorrent
    buildsystem: simple
    build-commands:
      - mv pikatorrent /app/pikatorrent
      - mkdir -p /app/bin
      - ln -s /app/pikatorrent/pikatorrent /app/bin/pikatorrent
      - install -Dm644 app/linux/packaging/${FLATPAK_ID}.desktop -t ${FLATPAK_DEST}/share/applications/
      - install -Dm644 app/linux/packaging/${FLATPAK_ID}.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo/
      - install -Dm644 assets/logo.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
    sources:
      - type: archive
        url: https://github.com/G-Ray/pikatorrent/releases/download/v0.15.0/PikaTorrent-v0.15.0-linux-x64.zip
        sha256: 5269fdfe05d64694430f6ec4b24fd0a8e980ef911c401ecc6bb40dd5b4bd211c
        dest: pikatorrent
        strip-components: 0
        only-arches:
          - x86_64
        x-checker-data:
          is-main-source: true
          type: json
          url: https://api.github.com/repos/G-Ray/pikatorrent/releases/latest
          version-query: .tag_name | sub("^v"; "")
          timestamp-query: .published_at
          url-query: .assets | map(.browser_download_url | select(endswith("-linux-x64.zip")))
            | first

      - type: archive
        url: https://github.com/G-Ray/pikatorrent/releases/download/v0.15.0/PikaTorrent-v0.15.0-linux-arm64.zip
        sha256: 3639b5ab3f68d750d762a4f23ce4918c1127d5cb60a6c6011e6808c7947daa8c
        dest: pikatorrent
        strip-components: 0
        only-arches:
          - aarch64
        x-checker-data:
          type: json
          url: https://api.github.com/repos/G-Ray/pikatorrent/releases/latest
          version-query: .tag_name | sub("^v"; "")
          timestamp-query: .published_at
          url-query: .assets | map(.browser_download_url | select(endswith("-linux-arm64.zip")))
            | first

      - type: git
        url: https://github.com/G-Ray/pikatorrent
        tag: v0.15.0
        commit: 7570685471c1f584c123eeba553dc38e033beb73
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
